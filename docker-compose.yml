version: "3.9"

services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: palimpsest
      POSTGRES_PASSWORD: palimpsest
      POSTGRES_DB: palimpsest
    ports:
      - "5432:5432"
    volumes:
      - palimpsest_pgdata:/var/lib/postgresql/data

  api:
    build: .
    env_file: .env
    depends_on:
      - db
    ports:
      - "8000:8000"

volumes:
  palimpsest_pgdata:
